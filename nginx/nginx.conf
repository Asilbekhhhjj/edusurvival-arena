# ================================================
# EduSurvival Arena — Nginx Production Config
# 24,000+ foydalanuvchi uchun optimallashtirilgan
# ================================================

# Worker processes — server CPU core soni bilan teng
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;     # Har bir worker uchun max ulanish
    use epoll;                   # Linux uchun eng tezkor event model
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ─── LOGGING ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time"';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ─── PERFORMANCE ─────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;   # Nginx versiyasini yashirish (xavfsizlik)

    # ─── GZIP COMPRESSION (bandwidth 70% kamaytiradi) ────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ─── RATE LIMITING (DDoS himoya) ─────────────────────────────────────
    # Login sahifasiga: 10 ta urinish/daqiqa per IP
    limit_req_zone  $binary_remote_addr zone=login_limit:20m   rate=10r/m;
    # API so'rovlari: 60 ta/daqiqa per IP
    limit_req_zone  $binary_remote_addr zone=api_limit:20m     rate=60r/m;
    # Umumiy sahifalar: 200 ta/daqiqa per IP
    limit_req_zone  $binary_remote_addr zone=general_limit:30m rate=200r/m;
    # Ulanishlar soni per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── UPSTREAM (agar Node.js SSR backend bo'lsa) ───────────────────────
    # upstream app_backend {
    #     server 127.0.0.1:3000;
    #     keepalive 32;
    # }

    # ─── HTTP → HTTPS REDIRECT ────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name your-domain.com www.your-domain.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── MAIN HTTPS SERVER ────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        root /var/www/edusurvival/dist;
        index index.html;

        # ─── SSL/TLS (Let's Encrypt) ──────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

        # Modern TLS protokollari (TLS 1.2 va 1.3 faqat)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;

        # ─── SECURITY HEADERS ─────────────────────────────────────────────
        # HSTS: brauzer faqat HTTPS ishlatsin (2 yil)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # Clickjacking himoya
        add_header X-Frame-Options "SAMEORIGIN" always;
        # MIME-type sniffing himoya
        add_header X-Content-Type-Options "nosniff" always;
        # XSS himoya
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Permissions policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content Security Policy — XSS va injection hujumlaridan himoya
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
            font-src 'self' https://fonts.gstatic.com data:;
            img-src 'self' data: blob: https:;
            connect-src 'self' https://*.supabase.co wss://*.supabase.co https://hemis.tuit.uz;
            frame-ancestors 'self';
            base-uri 'self';
            form-action 'self';
        " always;

        # ─── CONNECTION LIMITS ────────────────────────────────────────────
        limit_conn addr 50;  # Bir IP dan max 50 parallel ulanish

        # ─── SPA ROUTING (React Router) ───────────────────────────────────
        location / {
            limit_req zone=general_limit burst=30 nodelay;
            try_files $uri $uri/ /index.html;

            # index.html — cache yo'q (yangi deploy ko'rinsin)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }

        # ─── STATIC ASSETS (JS/CSS/fonts) — Aggressiv cache ──────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── SECURITY: Yashirin fayllarni bloklash ────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|log|sh|bak|sql)$ {
            deny all;
            return 404;
        }

        # ─── UPLOAD SIZE LIMIT ────────────────────────────────────────────
        client_max_body_size 10m;
        client_body_timeout 30s;
        client_header_timeout 30s;
        send_timeout 30s;

        # ─── ERROR PAGES ─────────────────────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
